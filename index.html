<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-to-Real</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
    <!-- Top Bar -->
    <div id="top-bar">
        <!-- Peer connection UI -->
        <div class="peer-info">
            <span>Session Link: <a href="#" id="peer-link" target="_blank">...initializing...</a></span>
            <span id="peer-status" style="margin-left: 10px; font-size: 0.9em; color: #666;"></span>
        </div>

        <!-- Status Info -->
        <div class="status-info" style="color: #aaa; font-family: monospace; font-size: 14px; display: flex; align-items: center;">
            ΔT: <span id="time-diff-display" style="width: 65px; text-align: right; display: inline-block;">0.000</span>s
        </div>

        <!-- Action buttons -->
        <div class="action-container">
            <div style="display: flex; align-items: center; gap: 5px;">
                <canvas id="input-vu-meter" width="10" height="20" style="background: #333; border-radius: 2px;"></canvas>
                <select id="audio-input-btn" class="action-btn" style="width: auto; padding: 0 10px;">
                    <option value="">Audio Input</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <canvas id="output-vu-meter" width="10" height="20" style="background: #333; border-radius: 2px;"></canvas>
                <select id="audio-output-btn" class="action-btn" style="width: auto; padding: 0 10px;">
                    <option value="">Audio Output</option>
                </select>
            </div>
            <button id="upload-btn" class="action-btn">Upload</button>
            <button id="download-btn" class="action-btn">Download</button>
        </div>
    </div>

    <!-- Main DAW canvas -->
    <canvas id="daw-canvas"></canvas>

    <!-- Hidden file input for directory selection -->
    <input type="file" id="directory-picker" webkitdirectory directory style="display: none;" />

    <script type="module" src="script.js"></script>
</body>

</html>
