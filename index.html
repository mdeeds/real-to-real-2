<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-to-Real</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
    <!-- Top Bar -->
    <div id="top-bar">
        <!-- Peer connection UI -->
        <div class="peer-info">
            <span>Session ID: <a href="#" id="peer-link" title="Click to copy link">...initializing...</a></span>
            <span id="peer-status" style="margin-left: 10px; font-size: 0.9em; color: #666;"></span>
        </div>

        <!-- Status Info -->
        <div class="status-info" style="color: #aaa; font-family: monospace; font-size: 14px; display: flex; align-items: center;">
            ΔT: <span id="time-diff-display" style="width: 65px; text-align: right; display: inline-block;">0.000</span>s
        </div>

        <!-- Action buttons -->
        <div class="action-container">
            <div style="display: flex; align-items: center; gap: 5px; margin-right: 10px;">
                <label for="metronome-toggle" style="color: #aaa; font-size: 12px; cursor: pointer;">Metronome</label>
                <input type="checkbox" id="metronome-toggle" style="cursor: pointer;" />
                <input type="number" id="bpm-input" value="120" min="40" max="300" style="width: 50px; background: #333; color: white; border: 1px solid #555; border-radius: 2px; padding: 2px 5px;" />
                <span style="color: #aaa; font-size: 12px;">BPM</span>
            </div>
            <button id="undo-btn" class="action-btn" style="display: none; background-color: #ff9800; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 10px;">Undo Delete</button>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <canvas id="input-vu-meter" width="10" height="20" style="background: #333; border-radius: 2px;"></canvas>
                    <select id="audio-input-btn" class="action-btn" style="width: 150px; padding: 0 10px; height: 24px; font-size: 12px;">
                        <option value="">Audio Input</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <canvas id="output-vu-meter" width="10" height="20" style="background: #333; border-radius: 2px;"></canvas>
                    <select id="audio-output-btn" class="action-btn" style="width: 150px; padding: 0 10px; height: 24px; font-size: 12px;">
                        <option value="">Audio Output</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <button id="upload-btn" class="action-btn" style="height: 24px; font-size: 12px; width: 80px;">Upload</button>
                <button id="download-btn" class="action-btn" style="height: 24px; font-size: 12px; width: 80px;">Download</button>
            </div>
            <button id="reset-btn" class="action-btn" style="background-color: #f44336; color: white; border: none; padding: 0 10px; border-radius: 4px; cursor: pointer; margin-left: 10px; height: 53px; font-size: 12px; font-weight: bold;">RESET</button>
        </div>
    </div>

    <!-- Main DAW canvas -->
    <canvas id="daw-canvas"></canvas>

    <!-- Hidden file input for directory selection -->
    <input type="file" id="directory-picker" webkitdirectory directory style="display: none;" />

    <script type="module" src="script.js"></script>
</body>

</html>
